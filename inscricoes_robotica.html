<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h2>Formulário de Inscrição - Robótica</h2>

<form action="#" method="post" enctype="multipart/form-data">

    <fieldset>
        <legend>Dados Pessoais</legend>

        <label>Nome completo:</label>
        <input type="text" name="nome" required>

        <label for="E-mail institucional"></label>
        <input type="email" name="email" required>

        <label>Curso:</label>
        <input type="text" name="curso" required>

        <label>Serie/ano:</label>
        <input type="text" name="serie_ano" required>
    </fieldset>

<fieldset>
        <legend>Inscrever a Equipe</legend>

        <label>Modalidade de participação (radio: olimpíada ou projeto):</label>
        <input type="text" name="Modalidade de participação (radio: olimpíada ou projeto)" required>

        <label>Nome da equipe:</label>
        <input type="text" name="nome_equipe" required>

        <label>Quantidade de integrantes (number com limite):</label>
        <input type="number" name="quantidade_integrantes" min="1" max="5" required>
<br>
        <label>Lista de integrantes (textarea):</label><br>
        <textarea name="lista_integrantes" rows="4" required></textarea>
    </fieldset>

    <fieldset>

    </fieldset>
    
</body>
</html>
