<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>inscricoes_robotica</title>
</head>
<body>

<h2>Formulário de Inscrição - Robótica</h2>

<form>

<fieldset>
    <legend>Dados</legend>

    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome"><br><br>

    <label for="email">E-mail institucional:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="curso">Curso:</label>
    <input type="text" id="curso" name="curso"><br><br>

    <label for="serie">Série/ano:</label>
    <input type="text" id="serie" name="serie">
</fieldset>

<br>

<fieldset>
    <legend>Participação</legend>

    <input type="radio" id="olimpiada" name="modalidade" value="olimpiada">
    <label for="olimpiada">Olimpíada</label>

    <input type="radio" id="projeto" name="modalidade" value="projeto">
    <label for="projeto">Projeto</label>

    <br><br>

    <label for="equipe">Nome da equipe:</label>
    <input type="text" id="equipe" name="equipe"><br><br>

    <label for="qtd">Quantidade de integrantes:</label>
    <input type="number" id="qtd" name="qtd" min="1" max="10"><br><br>

    <label for="lista">Lista de integrantes:</label><br>
    <textarea id="lista" name="lista" rows="4" cols="40"></textarea>
</fieldset>

<br>

<fieldset>
    <legend>Extras</legend>

    <label for="equip">Necessita de equipamentos especiais?</label>
    <input type="text" id="equip" name="equip"><br><br>

    <label for="arquivo">Upload de proposta de projeto:</label>
    <input type="file" id="arquivo" name="arquivo"><br><br>

    <input type="checkbox" id="reg" name="reg">
    <label for="reg">Aceite de regulamento</label>
</fieldset>

<br>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>

</body>
</html>
