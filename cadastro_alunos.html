<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div class="container">
    <h2>Cadastro de Alunos</h2>

    <form action="#" method="post">
        
        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" required><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required><br>

        <label for="confirmarSenha">Confirmar senha:</label>
        <input type="password" id="confirmarSenha" name="confirmarSenha" required><br>

        <label for="dataNascimento">Data de nascimento:</label>
        <input type="date" id="dataNascimento" name="dataNascimento" required><br>

        <div class="radio-group">
            <label>Gênero:</label>
            <input type="radio" id="masculino" name="genero" value="masculino" required>
            <label for="masculino">Masculino</label>

            <input type="radio" id="feminino" name="genero" value="feminino">
            <label for="feminino">Feminino</label>

            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Aceito os termos de uso</label>
        </div>

        <div class="buttons">
            <button type="submit" class="submit-btn">Enviar</button>
            <button type="reset" class="reset-btn">Limpar</button>
        </div>

    </form>
</div>

</body>
</html>
