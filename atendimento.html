<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>

<div class="container">
    <h2>Atendimento ao Cliente</h2>

    <form action="#" method="post" enctype="multipart/form-data">
        
    <fieldset>
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">

        <label for="tipo">Tipo de Atendimento:</label>
        <select id="tipo" name="tipo" required>
            <option value="">Selecione...</option>
            <option value="duvida">Dúvida</option>
            <option value="reclamacao">Reclamação</option>
            <option value="sugestao">Sugestão</option>
        </select><br>
    </fieldset>
        
    <fieldset>
        <div class="radio-group">
            <label>Prioridade:</label><br>
            <input type="radio" name="prioridade" value="baixa" required> Baixa
            <input type="radio" name="prioridade" value="media"> Média
            <input type="radio" name="prioridade" value="alta"> Alta
            <br>
            <br>
        </div>

        <label for="descricao">Descrição detalhada:</label><br>
        <textarea id="descricao" name="descricao" rows="5" required></textarea> <br>
    </fieldset>
        

        <label for="arquivo">Anexo de arquivo:</label>
        <input type="file" id="arquivo" name="arquivo">

        <div class="checkbox-group">
            <input type="checkbox" id="autorizacao" name="autorizacao" required>
            <label for="autorizacao">Autorizo o contato da empresa</label>
        </div>

        <button type="submit">Enviar</button>

    </form>
</div>

</body>
</html>
