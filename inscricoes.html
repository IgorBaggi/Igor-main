<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<h2>Formulário de Inscrição - Cursos Técnicos</h2>

<form action="#" method="post" enctype="multipart/form-data">

    <fieldset>
        <legend>Dados Pessoais</legend>

        <label>Nome completo:</label>
        <input type="text" name="nome" required><br><br>

        <label>CPF:</label>
        <input type="text" name="cpf" required><br><br>

        <label>Data de nascimento:</label>
        <input type="date" name="data_nascimento" required>
    </fieldset>

    <br>

    <fieldset>
        <legend>Endereço</legend>

        <label>Rua:</label>
        <input type="text" name="rua"><br><br>

        <label>Número:</label>
        <input type="number" name="numero"><br><br>

        <label>Cidade:</label>
        <input type="text" name="cidade"><br><br>

        <label>Estado:</label>
        <input type="text" name="estado">
    </fieldset>

    <br>

    <fieldset>
        <legend>Curso</legend>

        <label>Curso desejado:</label>
        <select name="curso">
            <option>Informática</option>
            <option>Administração</option>
            <option>Enfermagem</option>
            <option>Mecânica</option>
        </select>
    </fieldset>

    <br>

    <fieldset>
        <legend>Turno</legend>

        <input type="radio" name="turno" value="manha"> Manhã
        <input type="radio" name="turno" value="tarde"> Tarde
        <input type="radio" name="turno" value="noite"> Noite
    </fieldset>

    <br>

    <fieldset>
        <legend>Experiência</legend>

        <label>Já possui experiência?</label><br>
        <input type="radio" name="experiencia" value="sim"> Sim
        <input type="radio" name="experiencia" value="nao"> Não
    </fieldset>

    <br>

    <fieldset>
        <legend>Áreas de Interesse</legend>

        <input type="checkbox" name="interesse" value="programacao"> Programação
        <input type="checkbox" name="interesse" value="gestao"> Gestão
        <input type="checkbox" name="interesse" value="saude"> Saúde
        <input type="checkbox" name="interesse" value="industria"> Indústria
    </fieldset>

    <br>

    <fieldset>
        <legend>Upload</legend>

        <label>Documento (RG ou CPF):</label>
        <input type="file" name="documento">
    </fieldset>

    <br>

    <fieldset>
        <legend>Observações</legend>

        <textarea name="observacoes" rows="4" cols="40"></textarea>
    </fieldset>

    <br>

    <button type="submit">Enviar</button>

</form>

</body>
</html>
