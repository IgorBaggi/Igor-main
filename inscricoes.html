<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>inscricoes</title>
</head>
<body>

<h2>Formulário de Inscrição</h2>

<form>

    <fieldset>
        <legend>Dados pessoais</legend>

        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" required><br>><br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required><br><br>

        <label for="data">Data de nascimento:</label>
        <input type="date" id="data" name="data">
    </fieldset>

    <br>

    <fieldset>
        <legend>Endereço</legend>

        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="rua"><br><br>

        <label for="numero">Número:</label>
        <input type="text" id="numero" name="numero"><br><br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade"><br><br>

        <label for="estado">Estado:</label>
        <input type="text" id="estado" name="estado">
    </fieldset>

    <br>

    <fieldset>
        <legend>Curso</legend>

        <label for="curso">Curso desejado:</label>
        <select id="curso" name="curso">
            <option value="informatica">Informática</option>
            <option value="administracao">Administração</option>
            <option value="enfermagem">Enfermagem</option>
            <option value="mecanica">Mecânica</option>
        </select>
    </fieldset>

    <br>

    <fieldset>
        <legend>Turno</legend>

        <input type="radio" id="manha" name="turno" value="manha">
        <label for="manha">Manhã</label>

        <input type="radio" id="tarde" name="turno" value="tarde">
        <label for="tarde">Tarde</label>

        <input type="radio" id="noite" name="turno" value="noite">
        <label for="noite">Noite</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Experiência</legend>

        <input type="radio" id="sim" name="experiencia" value="sim">
        <label for="sim">Sim</label>

        <input type="radio" id="nao" name="experiencia" value="nao">
        <label for="nao">Não</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Áreas de interesse</legend>

        <input type="checkbox" id="tec" name="interesse" value="tecnologia">
        <label for="tec">Tecnologia</label>

        <input type="checkbox" id="saude" name="interesse" value="saude">
        <label for="saude">Saúde</label>

        <input type="checkbox" id="neg" name="interesse" value="negocios">
        <label for="neg">Negócios</label>

        <input type="checkbox" id="ind" name="interesse" value="industria">
        <label for="ind">Indústria</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Documentos</legend>

        <label for="doc">Upload de RG ou CPF:</label>
        <input type="file" id="doc" name="documento">
    </fieldset>

    <br>

    <fieldset>
        <legend>Observações</legend>

        <label for="obs">Digite aqui:</label><br>
        <textarea id="obs" name="observacoes" rows="4" cols="40"></textarea>
    </fieldset>

    <br>

    <button type="submit">Enviar</button>

</form>

</body>
</html>
